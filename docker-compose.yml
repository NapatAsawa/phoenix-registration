services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phoenix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phoenix"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: 500

  # One-shot: apply migrations, then exit. api/worker wait for it to complete so
  # neither races the other applying the same migration.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/db/migrate-cli.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/phoenix
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/api/index.js"]
    # development (not production) so this demo stack serves the throwaway UI at /
    # and the dev-only GET /dev/latest-link. In production that endpoint is withheld.
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/phoenix
      API_PORT: "3000"
      PUBLIC_BASE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker/index.js"]
    # Route Confirmation Emails to Mailpit so the link is viewable in its inbox
    # (http://localhost:8025). PUBLIC_BASE_URL matches the api so the emailed link
    # points back at the host-published API port.
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/phoenix
      PUBLIC_BASE_URL: http://localhost:3000
      EMAIL_TRANSPORT: smtp
      SMTP_URL: smtp://mailpit:1025
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

volumes:
  pgdata:
